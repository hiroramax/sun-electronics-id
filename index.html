<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUN Electronics — PT Samahita Utama Nusantara</title>

<style>
:root {
  --deep-green: #0D3B1E;
  --forest: #1A5C32;
  --emerald: #2E7D4A;
  --gold: #C9982E;
  --gold-light: #E8BC4A;
  --gold-glow: #F5D77A;
  --cream: #FAF6ED;
  --white: #FFFFFF;
  --dark: #0A0F0D;
  --gray-dark: #2A2F2C;
  --gray: #6B7370;
  --gray-light: #B8BDB9;
  --gray-lighter: #E8ECE9;
  --gradient-hero: linear-gradient(145deg, #0A1A10 0%, #0D3B1E 40%, #1A5C32 100%);
  --gradient-gold: linear-gradient(135deg, #C9982E, #E8BC4A, #C9982E);
  --shadow-soft: 0 4px 24px rgba(0,0,0,0.08);
  --shadow-medium: 0 8px 40px rgba(0,0,0,0.12);
  --shadow-gold: 0 4px 30px rgba(201,152,46,0.2);
  --radius: 12px;
  --radius-lg: 20px;
  --transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; overflow-x: hidden; width: 100%; }

body {
  font-family: 'DM Sans', sans-serif;
  color: var(--dark);
  background: var(--cream);
  overflow-x: hidden;
  line-height: 1.7;
  width: 100%;
  max-width: 100vw;
}

.hero, .section, .footer, .navbar { max-width: 100vw; }

h1, h2, h3, h4 { font-family: 'Playfair Display', serif; line-height: 1.2; }

/* ==================== NAVBAR ==================== */
.navbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  padding: 16px 40px;
  display: flex; align-items: center; justify-content: space-between;
  transition: var(--transition);
  background: transparent;
}
.navbar.scrolled {
  background: rgba(10, 26, 16, 0.95);
  backdrop-filter: blur(20px);
  padding: 12px 40px;
  box-shadow: 0 2px 30px rgba(0,0,0,0.3);
}
.nav-logo {
  display: flex; align-items: center; gap: 12px;
  text-decoration: none; color: var(--white);
}
.nav-logo svg { width: 44px; height: 44px; }
.nav-logo-text { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 700; letter-spacing: 1px; }
.nav-logo-sub { font-size: 0.6rem; letter-spacing: 3px; text-transform: uppercase; opacity: 0.7; font-family: 'DM Sans', sans-serif; }

.nav-links { display: flex; gap: 32px; align-items: center; }
.nav-links a {
  color: rgba(255,255,255,0.8); text-decoration: none; font-size: 0.85rem;
  font-weight: 500; letter-spacing: 0.5px; transition: var(--transition);
  position: relative;
}
.nav-links a:hover { color: var(--gold-light); }
.nav-links a::after {
  content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 2px;
  background: var(--gold); transition: var(--transition);
}
.nav-links a:hover::after { width: 100%; }

.lang-toggle {
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
  color: var(--white); padding: 6px 14px; border-radius: 20px; cursor: pointer;
  font-size: 0.8rem; font-weight: 600; letter-spacing: 1px; transition: var(--transition);
  font-family: 'DM Sans', sans-serif;
}
.lang-toggle:hover { background: var(--gold); border-color: var(--gold); color: var(--dark); }

.nav-hamburger {
  display: none; flex-direction: column; gap: 5px; cursor: pointer;
  background: none; border: none; padding: 4px;
}
.nav-hamburger span {
  width: 24px; height: 2px; background: var(--white); transition: var(--transition);
}

/* ==================== HERO ==================== */
.hero {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: var(--gradient-hero); position: relative; overflow: hidden;
  padding: 120px 40px 80px;
}
.hero::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at 70% 20%, rgba(201,152,46,0.08) 0%, transparent 60%),
              radial-gradient(ellipse at 20% 80%, rgba(30,93,50,0.15) 0%, transparent 50%);
}
.hero-grid-lines {
  position: absolute; inset: 0; overflow: hidden; opacity: 0.04;
}
.hero-grid-lines::before {
  content: ''; position: absolute; inset: 0; 
  background: repeating-linear-gradient(90deg, var(--white) 0px, transparent 1px, transparent 80px),
              repeating-linear-gradient(0deg, var(--white) 0px, transparent 1px, transparent 80px);
  transform: rotate(-15deg) scale(1.5);
}
.hero-sun {
  position: absolute; top: -100px; right: -50px; width: 400px; height: 400px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(232,188,74,0.12) 0%, rgba(201,152,46,0.03) 50%, transparent 70%);
  animation: pulse-glow 6s ease-in-out infinite;
  pointer-events: none;
}
@keyframes pulse-glow {
  0%, 100% { transform: scale(1); opacity: 0.6; }
  50% { transform: scale(1.1); opacity: 1; }
}

.hero-content {
  position: relative; z-index: 2; max-width: 800px; text-align: center;
}
.hero-badge {
  display: inline-block; padding: 8px 24px; border: 1px solid rgba(201,152,46,0.4);
  border-radius: 30px; font-size: 0.75rem; letter-spacing: 3px; text-transform: uppercase;
  color: var(--gold-light); margin-bottom: 32px;
  animation: fadeInUp 0.8s ease-out both;
}
.hero h1 {
  font-size: clamp(2.4rem, 5.5vw, 4.2rem); color: var(--white);
  margin-bottom: 8px; animation: fadeInUp 0.8s ease-out 0.15s both;
}
.hero h1 .gold { color: var(--gold-light); }
.hero-tagline {
  font-size: clamp(1rem, 2vw, 1.3rem); color: rgba(255,255,255,0.7);
  font-weight: 300; margin-bottom: 48px; max-width: 600px; margin-left: auto; margin-right: auto;
  animation: fadeInUp 0.8s ease-out 0.3s both;
}
.hero-buttons { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; animation: fadeInUp 0.8s ease-out 0.45s both; }

.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 14px 32px; border-radius: 50px; font-size: 0.9rem; font-weight: 600;
  text-decoration: none; transition: var(--transition); cursor: pointer; border: none;
  font-family: 'DM Sans', sans-serif; letter-spacing: 0.5px;
}
.btn-gold {
  background: var(--gradient-gold); color: var(--dark);
  box-shadow: var(--shadow-gold);
}
.btn-gold:hover { transform: translateY(-2px); box-shadow: 0 8px 40px rgba(201,152,46,0.35); }
.btn-outline {
  background: transparent; color: var(--white);
  border: 1.5px solid rgba(255,255,255,0.3);
}
.btn-outline:hover { border-color: var(--gold); color: var(--gold-light); }
.btn-green { background: var(--forest); color: var(--white); }
.btn-green:hover { background: var(--emerald); transform: translateY(-2px); }

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ==================== SECTIONS GENERAL ==================== */
.section {
  padding: 100px 40px;
}
.section-dark { background: var(--dark); color: var(--white); }
.section-green { background: var(--deep-green); color: var(--white); }
.section-cream { background: var(--cream); }
.section-white { background: var(--white); }

.section-header {
  text-align: center; max-width: 650px; margin: 0 auto 64px;
}
.section-label {
  font-size: 0.75rem; letter-spacing: 3px; text-transform: uppercase;
  color: var(--gold); font-weight: 600; margin-bottom: 16px;
}
.section-header h2 { font-size: clamp(1.8rem, 3.5vw, 2.8rem); margin-bottom: 16px; }
.section-header p { font-size: 1rem; opacity: 0.75; line-height: 1.7; }

.container { max-width: 1200px; margin: 0 auto; }

/* ==================== ABOUT ==================== */
.about-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: center;
}
.about-image {
  width: 100%; aspect-ratio: 4/3; border-radius: var(--radius-lg); overflow: hidden;
  background: var(--gradient-hero); display: flex; align-items: center; justify-content: center;
  position: relative;
}
.about-image-placeholder {
  color: rgba(255,255,255,0.3); font-size: 0.85rem; text-align: center;
  letter-spacing: 2px; text-transform: uppercase;
}
.about-image::after {
  content: ''; position: absolute; inset: 0;
  border: 1px solid rgba(201,152,46,0.2); border-radius: var(--radius-lg);
}
.about-content h2 { font-size: 2.2rem; margin-bottom: 24px; }
.about-content p { color: var(--gray); margin-bottom: 16px; }
.about-stats {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-top: 40px;
}
.stat { text-align: center; }
.stat-number { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--gold); font-weight: 700; }
.stat-label { font-size: 0.78rem; color: var(--gray); margin-top: 4px; }

/* ==================== PRODUCTS ==================== */
.products-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 32px;
}
.product-card {
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-lg); overflow: hidden; transition: var(--transition);
}
.product-card:hover { transform: translateY(-6px); border-color: rgba(201,152,46,0.3); box-shadow: var(--shadow-gold); }
.product-img {
  width: 100%; aspect-ratio: 16/10; background: linear-gradient(135deg, #0D2818, #1A4A2E);
  display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.2);
  font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase;
}
.product-info { padding: 28px; }
.product-info h3 { font-size: 1.2rem; margin-bottom: 10px; }
.product-info p { font-size: 0.88rem; opacity: 0.65; line-height: 1.6; }

/* ==================== SERVICES ==================== */
.services-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 32px;
}
.service-card {
  background: var(--white); border-radius: var(--radius-lg); padding: 40px 32px;
  text-align: center; transition: var(--transition);
  border: 1px solid var(--gray-lighter);
}
.service-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-medium); border-color: var(--gold); }
.service-icon {
  width: 64px; height: 64px; border-radius: 50%; margin: 0 auto 24px;
  background: linear-gradient(135deg, var(--deep-green), var(--emerald));
  display: flex; align-items: center; justify-content: center;
  font-size: 1.5rem; color: var(--gold-light);
}
.service-card h3 { font-size: 1.15rem; margin-bottom: 12px; color: var(--dark); }
.service-card p { font-size: 0.88rem; color: var(--gray); }

/* ==================== ANALYZER WIZARD ==================== */
.analyzer-wrapper {
  max-width: 700px; margin: 0 auto;
  background: var(--white); border-radius: var(--radius-lg);
  border: 1px solid var(--gray-lighter);
  box-shadow: var(--shadow-medium);
  overflow: hidden;
}
.analyzer-progress {
  height: 4px; background: var(--gray-lighter);
}
.analyzer-progress-bar {
  height: 100%; background: var(--gradient-gold); transition: width 0.5s ease;
}
.analyzer-body { padding: 48px 40px; }
.analyzer-step-label {
  font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase;
  color: var(--gold); font-weight: 600; margin-bottom: 12px;
}
.analyzer-body h3 {
  font-size: 1.4rem; margin-bottom: 28px; color: var(--dark);
}
.analyzer-options { display: flex; flex-direction: column; gap: 12px; }
.analyzer-option {
  display: flex; align-items: center; gap: 16px;
  padding: 16px 20px; border: 1.5px solid var(--gray-lighter);
  border-radius: var(--radius); cursor: pointer; transition: var(--transition);
  background: var(--white);
}
.analyzer-option:hover { border-color: var(--emerald); background: rgba(30,93,50,0.03); }
.analyzer-option.selected { border-color: var(--gold); background: rgba(201,152,46,0.06); }
.analyzer-option-radio {
  width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--gray-light);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: var(--transition);
}
.analyzer-option.selected .analyzer-option-radio {
  border-color: var(--gold);
}
.analyzer-option.selected .analyzer-option-radio::after {
  content: ''; width: 10px; height: 10px; border-radius: 50%; background: var(--gold);
}
.analyzer-option-text { font-size: 0.95rem; font-weight: 500; }
.analyzer-option-desc { font-size: 0.78rem; color: var(--gray); margin-top: 2px; }

.analyzer-nav {
  display: flex; justify-content: space-between; margin-top: 36px; gap: 16px;
}
.analyzer-nav .btn { font-size: 0.85rem; padding: 12px 28px; }

/* Analyzer Result */
.analyzer-result { display: none; }
.analyzer-result.active { display: block; }
.result-card {
  background: linear-gradient(135deg, var(--deep-green), #1A5C32);
  border-radius: var(--radius); padding: 28px; margin-bottom: 16px; color: var(--white);
}
.result-card h4 { font-size: 1rem; color: var(--gold-light); margin-bottom: 8px; }
.result-card p { font-size: 0.92rem; opacity: 0.9; }
.result-cards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }

/* ==================== GALLERY ==================== */
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px;
}
.gallery-item {
  aspect-ratio: 4/3; border-radius: var(--radius);
  background: linear-gradient(135deg, #0D2818, #1A4A2E);
  display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,0.2); font-size: 0.8rem; letter-spacing: 2px;
  text-transform: uppercase; overflow: hidden; transition: var(--transition);
  border: 1px solid rgba(255,255,255,0.06);
}
.gallery-item:hover { transform: scale(1.02); border-color: rgba(201,152,46,0.3); }

/* ==================== TESTIMONIALS ==================== */
.testimonials-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 32px;
}
.testimonial-card {
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-lg); padding: 36px; transition: var(--transition);
}
.testimonial-card:hover { border-color: rgba(201,152,46,0.2); }
.testimonial-quote {
  font-size: 1rem; font-style: italic; opacity: 0.8; margin-bottom: 24px; line-height: 1.7;
}
.testimonial-author { display: flex; align-items: center; gap: 14px; }
.testimonial-avatar {
  width: 48px; height: 48px; border-radius: 50%;
  background: var(--gradient-gold); display: flex; align-items: center; justify-content: center;
  font-weight: 700; color: var(--dark); font-size: 1.1rem;
}
.testimonial-name { font-weight: 600; font-size: 0.92rem; }
.testimonial-role { font-size: 0.78rem; opacity: 0.5; }
.testimonial-stars { color: var(--gold); font-size: 0.85rem; margin-bottom: 16px; letter-spacing: 2px; }

/* ==================== CONTACT ==================== */
.contact-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 48px;
}
.contact-info h3 { font-size: 1.5rem; margin-bottom: 24px; }
.contact-item { display: flex; gap: 16px; margin-bottom: 24px; align-items: flex-start; }
.contact-icon {
  width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0;
  background: linear-gradient(135deg, var(--deep-green), var(--emerald));
  display: flex; align-items: center; justify-content: center; color: var(--gold-light); font-size: 1rem;
}
.contact-detail h4 { font-size: 0.9rem; margin-bottom: 4px; }
.contact-detail p { font-size: 0.85rem; color: var(--gray); }
.contact-form { display: flex; flex-direction: column; gap: 16px; }
.form-input, .form-textarea {
  padding: 14px 18px; border: 1.5px solid var(--gray-lighter);
  border-radius: var(--radius); font-size: 0.9rem; font-family: 'DM Sans', sans-serif;
  transition: var(--transition); background: var(--white); color: var(--dark);
}
.form-input:focus, .form-textarea:focus { outline: none; border-color: var(--gold); }
.form-textarea { min-height: 120px; resize: vertical; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

/* ==================== FOOTER ==================== */
.footer {
  background: var(--dark); color: var(--white); padding: 64px 40px 32px;
}
.footer-grid {
  max-width: 1200px; margin: 0 auto;
  display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 48px;
  margin-bottom: 48px;
}
.footer-about p { font-size: 0.85rem; opacity: 0.6; margin-top: 16px; line-height: 1.7; }
.footer h4 { font-size: 0.85rem; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); margin-bottom: 20px; }
.footer-links { list-style: none; }
.footer-links li { margin-bottom: 10px; }
.footer-links a { color: rgba(255,255,255,0.6); text-decoration: none; font-size: 0.85rem; transition: var(--transition); }
.footer-links a:hover { color: var(--gold-light); }
.footer-bottom {
  max-width: 1200px; margin: 0 auto;
  border-top: 1px solid rgba(255,255,255,0.08);
  padding-top: 24px; display: flex; justify-content: space-between; align-items: center;
  font-size: 0.78rem; opacity: 0.5;
}

/* ==================== WHATSAPP FAB ==================== */
.wa-fab {
  position: fixed; bottom: 28px; right: 28px; z-index: 999;
  width: 60px; height: 60px; border-radius: 50%;
  background: #25D366; color: white; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 20px rgba(37,211,102,0.4);
  transition: var(--transition); font-size: 1.6rem;
}
.wa-fab:hover { transform: scale(1.1); box-shadow: 0 6px 30px rgba(37,211,102,0.5); }

/* ==================== MAP PLACEHOLDER ==================== */
.map-placeholder {
  width: 100%; height: 300px; border-radius: var(--radius);
  background: var(--gray-lighter); display: flex; align-items: center; justify-content: center;
  color: var(--gray); font-size: 0.85rem; letter-spacing: 2px; text-transform: uppercase;
  margin-top: 32px;
}

/* ==================== SCROLL ANIMATIONS ==================== */
.reveal {
  opacity: 0; transform: translateY(40px); transition: opacity 0.7s ease, transform 0.7s ease;
}
.reveal.visible { opacity: 1; transform: translateY(0); }

/* ==================== MOBILE MENU ==================== */
.mobile-menu {
  display: none; position: fixed; inset: 0; z-index: 999;
  background: rgba(10,26,16,0.98); backdrop-filter: blur(20px);
  flex-direction: column; align-items: center; justify-content: center; gap: 32px;
}
.mobile-menu.open { display: flex; }
.mobile-menu a {
  color: var(--white); text-decoration: none; font-size: 1.3rem; font-weight: 500;
  letter-spacing: 1px; transition: var(--transition);
}
.mobile-menu a:hover { color: var(--gold-light); }
.mobile-close {
  position: absolute; top: 24px; right: 32px; background: none; border: none;
  color: var(--white); font-size: 2rem; cursor: pointer;
}

/* ==================== RESPONSIVE ==================== */
@media (max-width: 768px) {
  .navbar { padding: 14px 20px; }
  .nav-links { display: none; }
  .nav-hamburger { display: flex; }
  .hero { padding: 100px 20px 60px; }
  .section { padding: 60px 20px; }
  .about-grid, .contact-grid { grid-template-columns: 1fr; gap: 32px; }
  .footer-grid { grid-template-columns: 1fr 1fr; gap: 32px; }
  .result-cards-grid { grid-template-columns: 1fr; }
  .analyzer-body { padding: 32px 24px; }
  .form-row { grid-template-columns: 1fr; }
  .hero-buttons { flex-direction: column; align-items: center; }
  .about-stats { grid-template-columns: repeat(3, 1fr); gap: 16px; }
}
</style>
</head>

<!-- NAVBAR -->
<nav class="navbar" id="navbar">
  <a href="#home" class="nav-logo">
    <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">

      <line x1="24" y1="2" x2="24" y2="10" stroke="#C9982E" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
      <line x1="24" y1="38" x2="24" y2="46" stroke="#C9982E" stroke-width=
